Ôªøname: √∞≈∏≈°‚Ç¨ Portfolio CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  PORTFOLIO_URL: https://jakkalilokesh.github.io

jobs:
  # √¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨
  # JOB 1 √¢‚Ç¨‚Äù Validate & Quality Checks
  # √¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨
  validate:
    name: √∞≈∏‚Äù¬ç Validate & Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: √∞≈∏‚Äú¬• Checkout Code
        uses: actions/checkout@v4

      - name: √∞≈∏‚Äú≈Ý Display File Sizes
        run: |
          echo "=============================="
          echo "√∞≈∏‚Äú¬Å Portfolio File Summary"
          echo "=============================="
          ls -lh *.html *.css *.js *.json 2>/dev/null || true
          echo ""
          echo "Total size:"
          du -sh . --exclude='.git'

      - name: √∞≈∏‚Äù¬ê Security Check √¢‚Ç¨‚Äù Exposed Secrets
        run: |
          echo "√∞≈∏‚Äù¬ç Scanning for exposed credentials..."
          # Check for common secret patterns
          if grep -rE "(password|secret|api_key|private_key)\s*=\s*['\"][^'\"]{8,}" \
            --include="*.js" --include="*.html" . 2>/dev/null | \
            grep -v "//\|#\|placeholder\|example\|your_"; then
            echo "√¢≈°¬Ý√Ø¬∏¬è  Potential secrets found √¢‚Ç¨‚Äù review above"
          else
            echo "√¢≈ì‚Ä¶ No exposed secrets detected"
          fi

      - name: √¢≈ì‚Ä¶ Check Required Files Exist
        run: |
          echo "Checking required files..."
          for f in index.html main.css script.js manifest.json robots.txt; do
            if [ -f "$f" ]; then
              echo "√¢≈ì‚Ä¶ $f"
            else
              echo "√¢¬ù≈í Missing: $f"
              exit 1
            fi
          done

      - name: √∞≈∏‚Äú¬è Check HTML Structure
        run: |
          echo "Validating HTML structure..."
          # Check meta tags
          grep -q 'meta name="description"' index.html && echo "√¢≈ì‚Ä¶ Meta description found" || echo "√¢≈°¬Ý√Ø¬∏¬è Missing meta description"
          grep -q 'meta name="viewport"' index.html && echo "√¢≈ì‚Ä¶ Viewport meta found" || echo "√¢≈°¬Ý√Ø¬∏¬è Missing viewport meta"
          grep -q '<title>' index.html && echo "√¢≈ì‚Ä¶ Title tag found" || echo "√¢¬ù≈í Missing title tag"
          grep -q 'rel="manifest"' index.html && echo "√¢≈ì‚Ä¶ Manifest linked" || echo "√¢≈°¬Ý√Ø¬∏¬è Missing manifest"
          grep -q 'rel="icon"' index.html && echo "√¢≈ì‚Ä¶ Favicon linked" || echo "√¢≈°¬Ý√Ø¬∏¬è Missing favicon"

      - name: √∞≈∏≈Ω¬® Check CSS Variables
        run: |
          echo "Checking design system..."
          grep -q '\-\-primary' main.css && echo "√¢≈ì‚Ä¶ CSS custom properties found" || echo "√¢≈°¬Ý√Ø¬∏¬è No CSS variables"
          LINES=$(wc -l < main.css)
          echo "√∞≈∏‚Äú¬ê CSS file: $LINES lines"

      - name: √∞≈∏‚Äú¬± Check Responsive Design
        run: |
          echo "Checking responsive breakpoints..."
          grep -c "@media" main.css | xargs -I{} echo "√∞≈∏‚Äú¬± {} media queries found"

  # √¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨
  # JOB 2 √¢‚Ç¨‚Äù Performance & SEO Audit
  # √¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨
  performance:
    name: √¢≈°¬° Performance Audit
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: √∞≈∏‚Äú¬• Checkout Code
        uses: actions/checkout@v4

      - name: √∞≈∏≈°‚Ç¨ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: √∞≈∏‚Äú¬¶ Install serve & lighthouse
        run: |
          npm install -g serve @lhci/cli

      - name: √∞≈∏≈í¬ê Start local server
        run: serve -p 8080 . &
        
      - name: √¢¬è¬≥ Wait for server
        run: sleep 3

      - name: √∞≈∏‚Äô¬° Run Lighthouse Audit
        run: |
          lhci autorun \
            --collect.url=http://localhost:8080 \
            --collect.numberOfRuns=1 \
            --upload.target=temporary-public-storage \
            --assert.preset=lighthouse:recommended \
            --assert.assertions.categories:performance=warn \
            --assert.assertions.categories:accessibility=warn \
            --assert.assertions.categories:seo=warn \
          || echo "√¢≈°¬Ý√Ø¬∏¬è Lighthouse completed with warnings"
        continue-on-error: true

  # √¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨
  # JOB 3 √¢‚Ç¨‚Äù Build & Minify Assets
  # √¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨
  build:
    name: √∞≈∏¬è‚Äî√Ø¬∏¬è Build & Optimize
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: √∞≈∏‚Äú¬• Checkout Code
        uses: actions/checkout@v4

      - name: √∞≈∏≈°‚Ç¨ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: √∞≈∏‚Äú¬¶ Install minification tools
        run: npm install -g clean-css-cli terser html-minifier-terser

      - name: √∞≈∏‚Äú¬Å Create dist directory
        run: mkdir -p dist

      - name: √∞≈∏≈Ω¬® Minify CSS
        run: |
          cleancss -o dist/main.css main.css
          ORIGINAL=$(wc -c < main.css)
          MINIFIED=$(wc -c < dist/main.css)
          echo "CSS: ${ORIGINAL} bytes √¢‚ÄÝ‚Äô ${MINIFIED} bytes ($(( (ORIGINAL - MINIFIED) * 100 / ORIGINAL ))% reduction)"

      - name: √¢≈°‚Ñ¢√Ø¬∏¬è Minify JavaScript
        run: |
          terser script.js -o dist/script.js --compress --mangle
          ORIGINAL=$(wc -c < script.js)
          MINIFIED=$(wc -c < dist/script.js)
          echo "JS: ${ORIGINAL} bytes √¢‚ÄÝ‚Äô ${MINIFIED} bytes ($(( (ORIGINAL - MINIFIED) * 100 / ORIGINAL ))% reduction)"

      - name: √∞≈∏‚Äú‚Äû Process HTML
        run: |
          html-minifier-terser \
            --collapse-whitespace \
            --remove-comments \
            --remove-optional-tags \
            --remove-redundant-attributes \
            --remove-script-type-attributes \
            --use-short-doctype \
            -o dist/index.html index.html
          
          # Copy static assets
          cp -r favicon.png favicon.ico profile.png manifest.json robots.txt sitemap.xml sw.js offline.html dist/ 2>/dev/null || true
          cp *.pdf dist/ 2>/dev/null || true

      - name: √∞≈∏‚Äú≈Ý Build Summary
        run: |
          echo "=============================="
          echo "√∞≈∏‚Äú¬¶ Build Output Summary"
          echo "=============================="
          ls -lh dist/
          echo ""
          echo "Total dist size: $(du -sh dist/ | cut -f1)"

      - name: √∞≈∏‚Äô¬æ Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-dist
          path: dist/
          retention-days: 30

  # √¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨
  # JOB 4 √¢‚Ç¨‚Äù Deploy to GitHub Pages
  # √¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨
  deploy:
    name: √∞≈∏≈í¬ê Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [validate, build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: √∞≈∏‚Äú¬• Checkout Code
        uses: actions/checkout@v4

      - name: √∞≈∏‚Äú¬¶ Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: portfolio-dist
          path: dist/

      - name: √∞≈∏≈°‚Ç¨ Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          commit_message: '√∞≈∏≈°‚Ç¨ Deploy: ${{ github.event.head_commit.message }}'
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: √¢≈ì‚Ä¶ Deployment Success
        run: |
          echo "============================================"
          echo "√¢≈ì‚Ä¶ Portfolio successfully deployed!"
          echo "√∞≈∏≈í¬ê URL: https://jakkalilokesh.github.io"
          echo "√∞≈∏‚Äú‚Ä¶ Time: $(date)"
          echo "√∞≈∏‚Äú¬ù Commit: ${{ github.sha }}"
          echo "============================================"

  # √¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨
  # JOB 5 √¢‚Ç¨‚Äù Notify on Failure
